<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wordle Familiar</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="palabras.js"></script>

    <style>
        :root {
            --color-correct: #538d4e;
            --color-present: #b59f3b;
            --color-absent: #3a3a3c;
            --color-border: #565758;
            --tg-bg: var(--tg-theme-bg-color, #121213);
            --tg-text: var(--tg-theme-text-color, #ffffff);
            --tg-btn: var(--tg-theme-secondary-bg-color, #818384);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--tg-bg);
            color: var(--tg-text);
            font-family: 'Clear Sans', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Altura total de la ventana */
            overflow: hidden;
        }

        header {
            text-align: center;
            padding: 10px 0;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid var(--color-border);
            flex-shrink: 0;
        }

        /* Contenedor flexible para el tablero */
        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1; /* Ocupa el espacio entre header y teclado */
            padding: 10px;
            min-height: 0; 
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            height: 100%;
            max-height: 380px; /* Evita que pise al teclado */
            aspect-ratio: 5/6;
        }

        .cell {
            border: 2px solid var(--color-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Teclado ajustado para no cortarse */
        #keyboard {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 10px 6px 30px 6px; /* Padding extra abajo */
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex-shrink: 0;
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }

        .key {
            background-color: var(--tg-btn);
            color: var(--tg-text);
            border: none;
            border-radius: 4px;
            height: 50px;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        .key.large { flex: 1.6; font-size: 0.7rem; }

        /* Colores de acierto */
        .correct { background-color: var(--color-correct) !important; border-color: var(--color-correct); }
        .present { background-color: var(--color-present) !important; border-color: var(--color-present); }
        .absent { background-color: var(--color-absent) !important; border-color: var(--color-absent); }

        /* Animación Shake */
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <header>WORDLE FAMILIAR</header>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row" id="row1"></div>
        <div class="keyboard-row" id="row2"></div>
        <div class="keyboard-row" id="row3"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. Lógica de la palabra diaria basada en tu TXT
        // Usamos el índice del día para que todos tengan la misma
        const diasDesdeInicio = Math.floor(Date.now() / (1000 * 60 * 60 * 24));
        const SECRET_WORD = DICCIONARIO[diasDesdeInicio % DICCIONARIO.length].toUpperCase();

        let currentRow = 0;
        let currentCol = 0;
        let gameOver = false;
        let boardState = Array(6).fill().map(() => Array(5).fill(''));

        // 2. Inicializar Tablero
        const boardEl = document.getElementById('board');
        for (let r = 0; r < 6; r++) {
            for (let c = 0; c < 5; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${r}-${c}`;
                boardEl.appendChild(cell);
            }
        }

        // 3. Inicializar Teclado
        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L', 'Ñ'],
            ['ENVIAR', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', 'BORRAR']
        ];

        keys.forEach((row, idx) => {
            const rowEl = document.getElementById(`row${idx+1}`);
            row.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'key' + (key.length > 1 ? ' large' : '');
                btn.textContent = key;
                btn.onclick = () => handleInput(key);
                rowEl.appendChild(btn);
            });
        });

        function handleInput(key) {
            if (gameOver) return;

            if (key === 'BORRAR') {
                if (currentCol > 0) {
                    currentCol--;
                    boardState[currentRow][currentCol] = '';
                    render();
                }
            } else if (key === 'ENVIAR') {
                if (currentCol === 5) checkWord();
                else shakeRow();
            } else if (currentCol < 5) {
                boardState[currentRow][currentCol] = key;
                currentCol++;
                render();
            }
        }

        function render() {
            for (let r = 0; r < 6; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    cell.textContent = boardState[r][c];
                }
            }
        }

        function checkWord() {
            const guess = boardState[currentRow].join('').toLowerCase();

            // VALIDACIÓN CON TU DICCIONARIO
            if (!DICCIONARIO.includes(guess)) {
                tg.showAlert("Esa palabra no vale ❌");
                shakeRow();
                return;
            }

            // Colorear
            const guessUpper = guess.toUpperCase();
            const rowCells = [];
            for(let i=0; i<5; i++) rowCells.push(document.getElementById(`cell-${currentRow}-${i}`));

            let checkSecret = SECRET_WORD;
            const statuses = Array(5).fill('absent');

            for(let i=0; i<5; i++) {
                if(guessUpper[i] === SECRET_WORD[i]) {
                    statuses[i] = 'correct';
                    checkSecret = checkSecret.replace(guessUpper[i], '_');
                }
            }

            for(let i=0; i<5; i++) {
                if(statuses[i] !== 'correct' && checkSecret.includes(guessUpper[i])) {
                    statuses[i] = 'present';
                    checkSecret = checkSecret.replace(guessUpper[i], '_');
                }
            }

            statuses.forEach((status, i) => rowCells[i].classList.add(status));

            if (guessUpper === SECRET_WORD) {
                gameOver = true;
                setTimeout(() => finish(currentRow + 1), 1000);
            } else if (currentRow === 5) {
                gameOver = true;
                setTimeout(() => finish('X'), 1000);
            } else {
                currentRow++;
                currentCol = 0;
            }
        }

        function shakeRow() {
            for(let i=0; i<5; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                cell.classList.add('shake');
                setTimeout(() => cell.classList.remove('shake'), 400);
            }
            tg.HapticFeedback.notificationOccurred('error');
        }

        function finish(result) {
            tg.sendData(result.toString());
            tg.close();
        }
    </script>
</body>
</html>
